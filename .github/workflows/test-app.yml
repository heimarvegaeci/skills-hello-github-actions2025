name: Test Application

on:
  push:
    branches: [ main ]
    paths: ['src/**', 'package.json']
  pull_request:
    branches: [ main ]
    paths: ['src/**', 'package.json']

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test Hello World App
    
    strategy:
      matrix:
        node-version: [16, 18, 20]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci --prefer-offline --no-audit
      
    - name: Run syntax check
      run: npm run lint
      
    - name: Test application with default settings
      run: npm start
      
    - name: Test application with custom settings
      env:
        GREETING: "Hello, CI/CD"
        NAME: "GitHub Actions Matrix"
      run: npm start
      
    - name: Test application error handling
      run: |
        # Test that the app can handle missing optional variables gracefully
        unset GREETING NAME NODE_ENV
        npm start