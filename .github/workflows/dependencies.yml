name: Auto Update Dependencies

on:
  schedule:
    # Run dependency updates weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    name: Update Dependencies
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Node.js (if package.json exists)
      if: hashFiles('package.json') != ''
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Update npm dependencies
      if: hashFiles('package.json') != ''
      run: |
        echo "📦 Updating npm dependencies..."
        npx npm-check-updates -u
        npm install
        
        if git diff --exit-code package.json package-lock.json; then
          echo "No dependency updates available"
          echo "updates_available=false" >> $GITHUB_ENV
        else
          echo "Dependencies updated"
          echo "updates_available=true" >> $GITHUB_ENV
        fi
        
    - name: Create Pull Request for dependency updates
      if: env.updates_available == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update dependencies'
        title: '🔄 Automated dependency updates'
        body: |
          ## 📦 Dependency Updates
          
          This PR contains automated dependency updates.
          
          ### Changes:
          - Updated npm dependencies to latest versions
          
          ### Testing:
          - [ ] Review the updated dependencies
          - [ ] Ensure no breaking changes
          - [ ] Test functionality after merge
          
          ---
          *This PR was created automatically by GitHub Actions*
        branch: automated-dependency-updates
        delete-branch: true